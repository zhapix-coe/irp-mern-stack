<!DOCTYPE html>
<html>
<head>
  <title>Change Text</title>
  <script>
    function changeText() {
      document.getElementById("msg").innerText = "Text changed using DOM!";
    }
  </script>
</head>
<body>

  <p id="msg">Original Text</p>
  <button onclick="changeText()">Change Text</button>

</body>
</html>
