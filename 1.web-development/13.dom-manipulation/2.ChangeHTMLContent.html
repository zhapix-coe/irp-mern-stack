<!DOCTYPE html>
<html>
<head>
  <title>Change HTML</title>
  <script>
    function changeHTML() {
      document.getElementById("box").innerHTML = "<h3>New HTML Content</h3>";
    }
  </script>
</head>
<body>

  <div id="box">Old Content</div>
  <button onclick="changeHTML()">Change HTML</button>

</body>
</html>
