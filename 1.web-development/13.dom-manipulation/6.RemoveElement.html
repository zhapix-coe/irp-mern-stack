<!DOCTYPE html>
<html>
<head>
  <title>Remove Element</title>
  <script>
    function removeItem() {
      var el = document.getElementById("removeMe");
      el.remove();
    }
  </script>
</head>
<body>

  <p id="removeMe">This will be removed</p>
  <button onclick="removeItem()">Remove</button>

</body>
</html>
