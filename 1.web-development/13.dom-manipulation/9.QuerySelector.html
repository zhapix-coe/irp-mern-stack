<!DOCTYPE html>
<html>
<head>
  <title>Query Selector (Modern Way)</title>
  <script>
    function update() {
      document.querySelector("#title").innerText = "Updated!";
    }
  </script>
</head>
<body>

  <h2 id="title">Original Title</h2>
  <button onclick="update()">Update</button>

</body>
</html>
