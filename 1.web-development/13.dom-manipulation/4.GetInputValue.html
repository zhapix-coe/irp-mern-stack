<!DOCTYPE html>
<html>
<head>
  <title>Get Input Value</title>
  <script>
    function showValue() {
      var val = document.getElementById("name").value;
      alert("You typed: " + val);
    }
  </script>
</head>
<body>

  <input type="text" id="name" placeholder="Enter name">
  <button onclick="showValue()">Show Value</button>

</body>
</html>
