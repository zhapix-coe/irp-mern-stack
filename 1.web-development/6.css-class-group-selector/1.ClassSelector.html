<!DOCTYPE html>
<html>
<head>
    <title>Class Selector</title>
    <style>
        .box {
            background-color: rgb(102, 137, 66);
            padding: 10px;
            margin: 10px;
            border: solid;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="box">Box 1</div>
<div class="box">Box 2</div>

<button class="box">Button 1</button>
<button class="box">Button 2</button>

</body>
</html>
