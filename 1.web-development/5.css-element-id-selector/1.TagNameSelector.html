<!doctype html>
<html>
  <head>
    <title>Element Selector</title>
    <style>
      p {
        color: blue;
      }
      h2 {
        color: red;
        font-size: 50px;
      }
    </style>
  </head>
  <body>
    <h2>Element Selector Heading</h2>
    <p>This paragraph is blue.</p>
    <p>This is also blue.</p>
    <p>This is not a blue.</p>
    
  </body>
</html>
