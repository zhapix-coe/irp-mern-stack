<!doctype html>
<html>
  <head>
    <title>Onclick Property</title>
  </head>
  <body>
    <h3>Event Binding using onclick property</h3>

    <button id="btn">Click Me</button>

    <script>
      document.getElementById("btn").onclick = function () {
        alert("Event handled using onclick property");
      };
    </script>
  </body>
</html>
