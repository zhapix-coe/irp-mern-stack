<!doctype html>
<html>
  <head>
    <title>Event Binding</title>
  </head>
  <body>
    <h3>Event Binding with addEventListener</h3>

    <button id="btn">Click Me</button>

    <script>
      document.getElementById("btn").addEventListener("click", function () {
        alert("Event bound using addEventListener");
      });
    </script>
  </body>
</html>
