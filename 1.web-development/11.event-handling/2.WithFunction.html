<!doctype html>
<html>
  <head>
    <title>Function Call Event</title>
  </head>
  <body>
    <h3>Event using Function</h3>

    <button onclick="showMessage()">Click Me</button>

    <script>
      function showMessage() {
        alert("Event handled using a function");
      }
    </script>
  </body>
</html>
