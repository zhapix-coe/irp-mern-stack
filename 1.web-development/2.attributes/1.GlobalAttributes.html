<!doctype html>
<html>
  <head>
    <title>Global Attributes</title>
    <style>
        .heading {
            font-size: 50px;
        }
    </style>
  </head>
  <body>
    <h1 id="main" class="heading" style="color: red" title="Main Heading">
      Global Attributes Example (id, class, style, title)
    </h1>

    <p class="text" title="This is a paragraph">
      This paragraph uses class and title attributes.
    </p>
  </body>
</html>
