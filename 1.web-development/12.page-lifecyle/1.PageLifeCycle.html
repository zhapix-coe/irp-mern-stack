
<!DOCTYPE html>
<html>
<head>
  <title>Page Life Cycle Demo</title>

  <script>
    console.log("1. Script in HEAD executed");

    document.addEventListener("DOMContentLoaded", function () {
      console.log("3. DOMContentLoaded event fired (DOM is ready)");
    });

    window.addEventListener("load", function () {
      console.log("4. Window load event fired (All resources loaded)");
    });
  </script>

</head>

<body>

  <h1>Page Life Cycle Demo</h1>

  <img src="https://picsum.photos/500/300" alt="sample image">

  <script>
    console.log("2. Script in BODY executed");

    document.querySelector("h1").addEventListener("click", function () {
      console.log("5. User clicked the heading");
    });
  </script>

</body>
</html>
