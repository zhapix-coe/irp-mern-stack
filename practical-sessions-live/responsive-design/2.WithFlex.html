<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive Without Media Query</title>

<style>

body{
  margin:0;
  font-family:Arial;
  text-align:center;
}

/* Container */

.container{
  display:flex;
  flex-wrap:wrap;
  padding:20px;
}

/* Boxes */

.box{
  flex:1 1 300px;
  margin:10px;
  padding:40px;
  background:orange;
}

</style>

</head>

<body>

<h2>Responsive Layout Without Media Queries</h2>
<p>Resize the browser window</p>

<div class="container">

<div class="box">Box 1</div>
<div class="box">Box 2</div>
<div class="box">Box 3</div>
<div class="box">Box 4</div>

</div>

</body>

</html>
