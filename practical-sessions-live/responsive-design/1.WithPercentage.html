<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive Percentage Layout</title>

<style>

body{
  margin:0;
  font-family:Arial;
  text-align:center;
}

/* Container */

.container{
  width:90%;
  margin:auto;
}

/* Boxes */

.box{
  width:30%;
  margin:1.5%;
  float:left;
  padding:40px 0;
  background:orange;
}

</style>

</head>

<body>

<h2>Responsive Layout Using Percentage</h2>
<p>Resize the browser to see how the boxes adjust</p>

<div class="container">

<div class="box">Box 1</div>
<div class="box">Box 2</div>
<div class="box">Box 3</div>

</div>

</body>

</html>
